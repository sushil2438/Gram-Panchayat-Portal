<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register - Gram Panchayat Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/80 backdrop-blur-2xl p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-slate-800">Register</h2>
            <p class="text-sm text-slate-500 mt-2">Create your villager account to report issues</p>
        </div>
        <form action="/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Full Name</label>
                <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 bg-slate-50 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Mobile Number</label>
                <input type="text" name="phone" required class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 bg-slate-50 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 bg-slate-50 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 rounded-xl font-bold shadow-lg mt-2">Create Account</button>
        </form>
        <div class="mt-6 text-center text-sm"><a href="/login" class="text-blue-600 font-bold hover:underline">Already have an account? Login</a></div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sarpanch Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border-t-4 border-amber-500">
        <h2 class="text-3xl font-extrabold text-white text-center mb-6">Admin Portal</h2>
        <form action="/admin" method="POST" class="space-y-5">
            <input type="text" name="username" required placeholder="Admin ID" class="w-full px-4 py-3.5 rounded-xl bg-slate-900 text-white border border-slate-600 outline-none">
            <input type="password" name="password" required placeholder="Password" class="w-full px-4 py-3.5 rounded-xl bg-slate-900 text-white border border-slate-600 outline-none">
            <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 py-3.5 rounded-xl font-extrabold">Authenticate</button>
        </form>
        <div class="mt-6 text-center"><a href="/" class="text-sm text-slate-400 hover:text-white">Return to Home</a></div>
    </div>
</body>
</html>

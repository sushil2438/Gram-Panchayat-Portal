<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sarpanch Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="bg-slate-900 rounded-2xl shadow-xl p-6 flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-amber-400">Gram Panchayat Admin</h1>
            <div class="flex items-center gap-4">
                <a href="/admin_dashboard?status=All" class="text-white text-sm hover:text-amber-400">All</a>
                <a href="/admin_dashboard?status=Pending" class="text-amber-400 text-sm">Pending</a>
                <a href="/admin_dashboard?status=Resolved" class="text-emerald-400 text-sm">Resolved</a>
                <a href="/logout" class="bg-red-500 px-4 py-2 rounded text-white font-bold ml-4">Logout</a>
            </div>
        </div>
        <div class="bg-white rounded-2xl shadow border overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-slate-600 text-sm uppercase"><th class="p-4">User</th><th class="p-4">Grievance</th><th class="p-4">Action</th></tr>
                </thead>
                <tbody>
                    {% for complaint in complaints %}
                    <tr class="border-b">
                        <td class="p-4 align-top">
                            <div class="font-bold">{{ complaint['name'] }}</div>
                            <div class="text-sm text-slate-500">{{ complaint['phone'] }}<br>{{ complaint['date'] }}</div>
                        </td>
                        <td class="p-4 align-top">
                            <span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-bold">{{ complaint['issue_category'] }}</span>
                            <p class="text-sm mt-2">{{ complaint['description'] }}</p>
                        </td>
                        <td class="p-4 align-top w-5/12">
                            <form action="/update_complaint/{{ complaint['id'] }}" method="POST" class="flex flex-col gap-2">
                                <div class="flex gap-2">
                                    <select name="status" class="p-2 border rounded font-bold outline-none flex-1">
                                        <option value="Pending" {% if complaint['status'] == 'Pending' %}selected{% endif %}>⏳ Pending</option>
                                        <option value="Resolved" {% if complaint['status'] == 'Resolved' %}selected{% endif %}>✅ Resolved</option>
                                    </select>
                                    <button type="submit" class="bg-slate-900 text-white px-4 py-2 rounded font-bold">Update</button>
                                </div>
                                <textarea name="sarpanch_reply" rows="2" placeholder="Reply..." class="w-full p-2 border rounded outline-none">{{ complaint['sarpanch_reply'] }}</textarea>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
